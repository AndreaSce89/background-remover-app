name: 🎨 Build Background Remover App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pillow numpy
          pip install rembg==2.0.52 onnxruntime==1.16.3
      
      - name: 🧠 Download U2Net model
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
          # Copia modello nella cartella del progetto
          copy %USERPROFILE%\.u2net\u2net.onnx . /Y
        shell: cmd
      
      - name: 🏗️ Build EXE
        run: |
          pyinstaller --clean --onefile --windowed ^
            --name "BackgroundRemover" ^
            --add-data "utils;utils" ^
            --add-data "u2net.onnx;." ^
            --hidden-import "rembg" ^
            --hidden-import "rembg.session_factory" ^
            --hidden-import "onnxruntime" ^
            --hidden-import "PIL" ^
            --hidden-import "PIL.Image" ^
            --hidden-import "numpy" ^
            main.py
        shell: cmd
      
      - name: 🎁 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Windows
          path: dist/BackgroundRemover.exe

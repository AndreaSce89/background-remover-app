name: 🎨 Build Background Remover App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 🪟 Costruisci per Windows
    runs-on: windows-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file EXE
        run: |
          pyinstaller --clean --onefile --windowed --name "BackgroundRemover" --add-data "utils;utils" --add-data "hooks;hooks" --additional-hooks-dir "hooks" --hidden-import "rembg" --hidden-import "rembg.session_factory" --hidden-import "onnxruntime" --hidden-import "PIL" --hidden-import "PyQt5.sip" --hidden-import "scipy" --hidden-import "pymatting" --hidden-import "pymatting.util" --hidden-import "pymatting.util.boxfilter" --copy-metadata "pymatting" --copy-metadata "rembg" --copy-metadata "scipy" main.py
      
      - name: 🎁 Salva il file
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Windows
          path: dist/BackgroundRemover.exe
      
      - name: 🚀 Pubblica Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BackgroundRemover.exe
          name: "Background Remover ${{ github.ref_name }}"
          body: "Nuova versione del Background Remover! 🎉"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: 🍎 Costruisci per Mac (Bonus)
    runs-on: macos-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file per Mac
        run: |
          pyinstaller --clean --onefile --windowed --name "BackgroundRemover" --add-data "utils:utils" --add-data "hooks:hooks" --additional-hooks-dir "hooks" --hidden-import "rembg" --hidden-import "rembg.session_factory" --hidden-import "onnxruntime" --hidden-import "PIL" --hidden-import "PyQt5.sip" --hidden-import "scipy" --hidden-import "pymatting" --hidden-import "pymatting.util" --hidden-import "pymatting.util.boxfilter" --copy-metadata "pymatting" --copy-metadata "rembg" --copy-metadata "scipy" main.py
      
      - name: 🎁 Salva il file Mac
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Mac
          path: dist/BackgroundRemover
      
      - name: 🚀 Pubblica Release Mac
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BackgroundRemover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache model
      uses: actions/cache@v3
      with:
        path: ~/.u2net
        key: u2net-v1
    
    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install PyQt5 rembg pillow onnxruntime numpy
    
    - name: Download model
      shell: pwsh
      run: |
        $dir = "$env:USERPROFILE\.u2net"
        $file = "$dir\u2net.onnx"
        if (!(Test-Path $file)) {
          New-Item -ItemType Directory -Force -Path $dir
          Invoke-WebRequest -Uri "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx" -OutFile $file
        }
        Get-Item $file | Select-Object Name, @{N="SizeMB";E={[math]::Round($_.Length/1MB,2)}}
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --clean BackgroundRemover.spec
    
    - name: Test EXE exists
      shell: pwsh
      run: |
        $exe = "dist\BackgroundRemover.exe"
        if (Test-Path $exe) {
          $size = (Get-Item $exe).Length / 1MB
          Write-Host "EXE creato: $([math]::Round($size,2)) MB"
        } else {
          Write-Error "EXE non trovato!"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: BackgroundRemover-Fixed
        path: dist/BackgroundRemover.exe

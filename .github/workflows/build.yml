name: 🎨 Build Background Remover App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 🪟 Build Windows
    runs-on: windows-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install ALL dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install PyQt5==5.15.10
          pip install Pillow==10.1.0
          pip install rembg==2.0.52
          pip install onnxruntime==1.16.3
          pip install numpy==1.24.3
          pip install scipy==1.11.4
          pip install pymatting==1.1.12
          pip install scikit-image==0.22.0
          pip install imageio==2.31.1
          pip install tqdm==4.66.1
      
      - name: 🧠 Download U2Net model
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
          copy %USERPROFILE%\.u2net\u2net.onnx . /Y
        shell: cmd
      
      - name: 🏗️ Build EXE with SPEC
        run: |
          pyinstaller BackgroundRemover.spec
      
      - name: 🎁 Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Windows
          path: dist/BackgroundRemover.exe

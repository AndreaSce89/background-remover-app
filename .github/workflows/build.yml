name: Build EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest  # Torna a windows-latest, più disponibile
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller==6.3.0
        pip install -r requirements.txt
    
    - name: Download model
      shell: pwsh
      run: |
        $dir = "$env:USERPROFILE\.u2net"
        $file = "$dir\u2net.onnx"
        if (!(Test-Path $file)) {
          New-Item -ItemType Directory -Force -Path $dir
          Invoke-WebRequest -Uri "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx" -OutFile $file
        }
        Write-Host "Modello:" (Get-Item $file).Length "bytes"
    
    - name: Build EXE
      run: |
        pyinstaller --noconfirm --clean --onefile --console --name BackgroundRemover main.py
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: BackgroundRemover-EXE
        path: dist/BackgroundRemover.exe

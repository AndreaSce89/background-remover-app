name: 🎨 Build Background Remover App

on:
  # Si attiva quando premi il pulsante verde
  workflow_dispatch:
  
  # Si attiva quando crei un tag tipo v1.0.0
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 🪟 Costruisci per Windows
    runs-on: windows-latest
    
    steps:
      # 1. Prendi i file dal tuo computer
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      # 2. Installa Python
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. Installa le cose necessarie
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      # 4. Scarica il cervello AI (prima volta)
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      # 5. COSTRUISCI L'EXE! 🎉
      - name: 🏗️ Crea file EXE
        run: |
          pyinstaller --clean --onefile --windowed --name "BackgroundRemover" --add-data "utils;utils" --hidden-import "rembg" --hidden-import "rembg.session_factory" --hidden-import "onnxruntime" --hidden-import "PIL" --hidden-import "PyQt5.sip" main.py
      
      # 6. Salva l'EXE come "regalo" (artifact)
      - name: 🎁 Salva il file
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Windows
          path: dist/BackgroundRemover.exe
      
      # 7. Se hai creato un tag, pubblica la Release!
      - name: 🚀 Pubblica Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BackgroundRemover.exe
          name: "Background Remover ${{ github.ref_name }}"
          body: "Nuova versione del Background Remover! 🎉"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: 🍎 Costruisci per Mac (Bonus)
    runs-on: macos-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file per Mac
        run: |
          pyinstaller --clean --onefile --windowed --name "BackgroundRemover" --add-data "utils:utils" --hidden-import "rembg" --hidden-import "rembg.session_factory" --hidden-import "onnxruntime" --hidden-import "PIL" --hidden-import "PyQt5.sip" main.py
      
      - name: 🎁 Salva il file Mac
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Mac
          path: dist/BackgroundRemover
      
      - name: 🚀 Pubblica Release Mac
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BackgroundRemover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

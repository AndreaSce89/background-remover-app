name: 🎨 Build Background Remover App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 🪟 Costruisci per Windows
    runs-on: windows-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file EXE
        run: |
          pyinstaller BackgroundRemover.spec
      
      - name: 🎁 Salva il file
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Windows
          path: dist/BackgroundRemover.exe

  build-macos:
    name: 🍎 Costruisci per Mac (Bonus)
    runs-on: macos-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file per Mac
        run: |
          pyinstaller BackgroundRemover.spec
      
      - name: 🎁 Salva il file Mac
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Mac
          path: dist/BackgroundRemover

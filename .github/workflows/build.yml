name: 🎨 Build Background Remover App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    name: 🪟 Costruisci per Windows
    runs-on: windows-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file EXE con SPEC
        run: |
          pyinstaller BackgroundRemover.spec
      
      - name: 🎁 Salva il file
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Windows
          path: dist/BackgroundRemover.exe
      
      - name: 🚀 Pubblica Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BackgroundRemover.exe
          name: "Background Remover ${{ github.ref_name }}"
          body: "Nuova versione del Background Remover! 🎉"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: 🍎 Costruisci per Mac (Bonus)
    runs-on: macos-latest
    
    steps:
      - name: 📥 Scarica i file
        uses: actions/checkout@v4
      
      - name: 🐍 Installa Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt
      
      - name: 🧠 Scarica modello U2Net
        run: |
          python -c "from rembg import new_session; s = new_session('u2net')"
      
      - name: 🏗️ Crea file per Mac con SPEC
        run: |
          pyinstaller BackgroundRemover.spec
      
      - name: 🎁 Salva il file Mac
        uses: actions/upload-artifact@v4
        with:
          name: BackgroundRemover-Mac
          path: dist/BackgroundRemover
      
      - name: 🚀 Pubblica Release Mac
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/BackgroundRemover
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
